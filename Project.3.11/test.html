<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .logo {
        display: inline-block;
        position: relative;
        width: 300px;
        height: 200px;
        background: linear-gradient(45deg, #841b2d, #c52b3b);
        box-shadow: 0px 0px 12px rgba(0, 0, 0, 0.4);
        text-align: center;
      }

      .logo::before {
        content: "";
        display: block;
        position: absolute;
        top: 0px;
        left: 0px;
        width: 100%;
        height: 100%;
        background: linear-gradient(45deg, transparent 50%, #fff 50%);
      }

      .text {
        display: inline-block;
        position: relative;
        top: 60px;
        font-size: 72px;
        font-weight: bold;
        text-transform: uppercase;
        color: #fff;
        text-shadow: 0px 0px 12px rgba(0, 0, 0, 0.4);
      }
    </style>
  </head>
  <body>
    <div class="logo">
      <span class="text">GODIVA</span>
    </div>
  </body>
</html>
